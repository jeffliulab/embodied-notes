{% extends "base.html" %}

{% block content %}
  {{ super() }}

  {# 仅在非首页时显示评论 #}
  {% if not page.is_homepage %}

    <hr>

    <h2 id="__comments">
      评论
      <a href="#__comments" class="headerlink" title="评论">#</a>
    </h2>

    {# Giscus 评论（基于 GitHub Discussions，仓库 jeffliulab/embodied-notes 的 Announcements 分类） #}
    <script src="https://giscus.app/client.js"
            data-repo="jeffliulab/embodied-notes"
            data-repo-id="R_kgDOSqKUrg"
            data-category="Announcements"
            data-category-id="DIC_kwDOSqKUrs4C-D6L"
            data-mapping="pathname"
            data-strict="0"
            data-reactions-enabled="1"
            data-emit-metadata="0"
            data-input-position="top"
            data-theme="preferred_color_scheme"
            data-lang="zh-CN"
            data-loading="lazy"
            crossorigin="anonymous"
            async>
    </script>

  {% endif %}
{% endblock %}
