name: Pages Redirect
# GH Pages 已关停：不再构建 mkdocs，只发布一个 3 秒提示后跳转到 jeffliulab.com 的静态页。
# index.html = 根；404.html = 兜底所有旧深链。两者同一份 pages-redirect/index.html。
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble redirect site
        run: |
          mkdir -p site
          cp pages-redirect/index.html site/index.html
          cp pages-redirect/index.html site/404.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
